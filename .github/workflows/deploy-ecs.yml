name: Deploy to ECS

on:
  workflow_call:
    inputs:
      ecr_path:
        description: 'ECR path without env prefix (e.g. teamble/api)'
        required: true
        type: string
      ecs_identifier:
        description: 'ECS identifier without env prefix (e.g. teamble_api)'
        required: true
        type: string
      prod_branch:
        description: 'Branch name that triggers production deployment'
        required: false
        type: string
        default: 'master'
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == inputs.prod_branch && 'production' || 'test' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == inputs.prod_branch && 'production' || 'test' }}

    env:
      ECR_REPOSITORY: ${{ github.ref_name == inputs.prod_branch && format('prod/{0}', inputs.ecr_path) || format('test/{0}', inputs.ecr_path) }}
      ECS_SERVICE: ${{ github.ref_name == inputs.prod_branch && format('prod_{0}', inputs.ecs_identifier) || format('test_{0}', inputs.ecs_identifier) }}
      ECS_CLUSTER: ${{ github.ref_name == inputs.prod_branch && 'teamble-cluster-prod' || 'teamble-cluster-test' }}
      ECS_TASK_FAMILY: ${{ github.ref_name == inputs.prod_branch && format('prod_{0}', inputs.ecs_identifier) || format('test_{0}', inputs.ecs_identifier) }}
      CONTAINER_NAME: ${{ github.ref_name == inputs.prod_branch && format('prod_{0}', inputs.ecs_identifier) || format('test_{0}', inputs.ecs_identifier) }}
      AWS_REGION: ${{ inputs.aws_region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub-Actions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fetch current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Summary
        run: |
          echo "Deployment completed successfully!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Service: ${{ env.ECS_SERVICE }}"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          echo "Region: ${{ env.AWS_REGION }}"
